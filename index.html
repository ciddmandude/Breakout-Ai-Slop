<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout - AI Slop Edition</title>
  <!--
    NOTE: This milestone uses fetch() to load level JSON files.
    It must be served over HTTP — open with VS Code Live Server,
    `python -m http.server`, or any local web server.
    Opening index.html directly via file:// will show "Loading…" indefinitely.
  -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ---- page background: dark with subtle diagonal grid ---- */
    body {
      min-height: 100vh;
      background-color: #0a0a12;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      font-family: monospace;
      color: #ccc;
      padding: 32px 16px;
    }

    /* ---- masthead above the bezel ---- */
    .masthead {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 18px;
      user-select: none;
    }
    .masthead-title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ffffff;
      text-shadow: 0 0 18px #6666ff99, 0 0 40px #6666ff44;
    }
    .masthead-sub {
      font-size: 11px;
      letter-spacing: 3px;
      color: #e94560;
      text-transform: uppercase;
    }

    /* ---- arcade bezel ---- */
    .bezel {
      position: relative;
      background: linear-gradient(160deg, #1e1e2e 0%, #111120 60%, #0d0d1a 100%);
      border-radius: 18px;
      padding: 22px 22px 18px;
      box-shadow:
        0 0 0 2px #2a2a4a,
        0 0 0 4px #111,
        0 8px 40px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* corner accent screws */
    .bezel::before,
    .bezel::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #333, #111);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.15), 0 1px 3px rgba(0,0,0,0.6);
    }
    .bezel::before { top: 10px; left: 10px; }
    .bezel::after  { top: 10px; right: 10px; }
    .bezel .screw-bl,
    .bezel .screw-br {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #333, #111);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.15), 0 1px 3px rgba(0,0,0,0.6);
    }
    .bezel .screw-bl { bottom: 10px; left: 10px; }
    .bezel .screw-br { bottom: 10px; right: 10px; }

    /* glowing border around the screen area */
    .screen-frame {
      border-radius: 6px;
      padding: 3px;
      background: linear-gradient(135deg, #3333aa55, #aa336655, #3333aa55);
      box-shadow: 0 0 24px rgba(80, 80, 200, 0.3), inset 0 0 8px rgba(0,0,0,0.6);
    }

    canvas {
      display: block;
      max-width: 100vw;
      max-height: 80vh;
      image-rendering: pixelated;
      cursor: none;
      border-radius: 4px;
    }

    /* ---- control legend below the bezel ---- */
    .controls {
      display: flex;
      gap: 28px;
      margin-top: 18px;
      user-select: none;
    }
    .ctrl {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #666688;
    }
    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      padding: 0 6px;
      background: linear-gradient(180deg, #222238 0%, #16162a 100%);
      border: 1px solid #3a3a5a;
      border-bottom: 2px solid #111;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      color: #aaaacc;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* ---- footer ---- */
    .footer {
      margin-top: 22px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #333355;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="masthead">
    <span class="masthead-title">BREAKOUT</span>
    <span class="masthead-sub">AI Slop Edition</span>
  </div>

  <div class="bezel">
    <span class="screw-bl"></span>
    <span class="screw-br"></span>
    <div class="screen-frame">
      <canvas id="gameCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl"><span class="key">←</span><span class="key">→</span> move</div>
    <div class="ctrl"><span class="key">SPACE</span> launch / confirm</div>
    <div class="ctrl"><span class="key">ESC</span> pause</div>
  </div>

  <div class="footer">insert coin &nbsp;·&nbsp; avoid the bottom</div>

  <script src="src/constants.js"></script>
  <script src="src/assets.js"></script>
  <script src="src/block.js"></script>
  <script src="src/levelLoader.js"></script>
  <script src="src/capsule.js"></script>
  <script src="src/collision.js"></script>
  <script src="src/ball.js"></script>
  <script src="src/paddle.js"></script>
  <script src="src/screens.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
